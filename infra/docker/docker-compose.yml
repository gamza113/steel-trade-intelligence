services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: stip-postgres
    environment:
      POSTGRES_USER: stip
      POSTGRES_PASSWORD: stip
      POSTGRES_DB: stip_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stip -d stip_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: stip-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: stip
      MINIO_ROOT_PASSWORD: stipsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
